services:
  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/frontend.Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/backend.Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - GIN_MODE=release
      - DB_HOST=db
      - DB_PORT=3306
      - DB_USER=${DB_USER:-blog_user}
      - DB_PASSWORD=${DB_PASSWORD:-changeme}
      - DB_NAME=${DB_NAME:-blog_db}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:5.7
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD:-root_password}
      - MYSQL_DATABASE=${DB_NAME:-blog_db}
      - MYSQL_USER=${DB_USER:-blog_user}
      - MYSQL_PASSWORD=${DB_PASSWORD:-changeme}
    volumes:
      - mysql_data:/var/lib/mysql
      - ../backend/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # Don't expose to external - remove ports for security
    # ports:
    #   - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4
      - --innodb-buffer-pool-size=256M
      - --max-connections=50
    restart: unless-stopped

volumes:
  mysql_data:
